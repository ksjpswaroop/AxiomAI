services:
  api:
    build: .
    command: axiomai-server
    ports:
      - "8000:8000"
    environment:
      AXIOMAI_PERSIST: sqlite:////data/axiomai.db
    volumes:
      - axiomai-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build: .
    command: >
      streamlit run apps/console/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --browser.gatherUsageStats=false
    ports:
      - "8501:8501"
    environment:
      AXIOMAI_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  axiomai-data:
