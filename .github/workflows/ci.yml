name: CI

on:
  push:
    branches: [master, "cursor/**"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check axiomai tests

      - name: Pytest with coverage
        run: pytest tests/ -q --cov=axiomai --cov-report=term-missing --cov-fail-under=75

      - name: Mypy (core modules)
        run: mypy axiomai/reasoner/engine.py --ignore-missing-imports

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t axiomai:ci .

      - name: Verify API starts
        run: |
          docker run -d --name axiomai-api -p 8000:8000 axiomai:ci axiomai-server
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          docker logs axiomai-api
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f axiomai-api 2>/dev/null || true
