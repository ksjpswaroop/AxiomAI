name: CI

on:
  push:
    branches: [master, "cursor/**"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check axiomai tests

      - name: Pytest with coverage
        run: pytest tests/ -q --cov=axiomai --cov-report=term-missing --cov-fail-under=75

      - name: Mypy (core modules)
        run: mypy axiomai/reasoner/engine.py --ignore-missing-imports
